<!DOCTYPE html>
<html lang="en-US" data-bs-theme="light">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title><!-- TAB TITLE--></title>
 <link rel="icon" type="image/x-icon" href="#favicon">
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
 <style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap');
  .montserrat-<uniquifier> {
    font-family: "Montserrat", sans-serif;
    font-optical-sizing: auto;
    font-weight: <weight>;
    font-style: normal;
  }
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap');
  .eb-garamond-<uniquifier> {
    font-family: "EB Garamond", serif;
    font-optical-sizing: auto;
    font-weight: <weight>;
    font-style: normal;
  }

  p {font-size: 15pt;}
  .image {border-radius: 8px;}
  [data-bs-theme="light"] .nav-link.active {color: #000;}
  [data-bs-theme="dark"] .nav-link.active {color: #FFF;}
  [data-bs-theme="light"] .nav-link:hover {color: #000;}
  [data-bs-theme="dark"] .nav-link:hover {color: #FFF;}
  [data-bs-theme="light"] h2, h3, h4, h5, h6, h7, h8, h9 {color: #LightSubtitleColor;}  
  [data-bs-theme="dark"] h2, h3, h4, h5, h6, h7, h8, h9 {color: #DarkSubtitleColor;}

  [data-bs-theme="light"] .link {color: #1074aa;}  
  [data-bs-theme="dark"] .link {color: #3F85C2;}

  [data-bs-theme="light"] .link, .link:link, .link:active, .link:visited {
    text-decoration: none;
    padding: 0px 2px 0px 2px;
    box-shadow: inset 0 -1px 0 -1px #1074aa;
    border-radius: 3px;
    transition: box-shadow .15s ease-in-out;
  }
  [data-bs-theme="dark"] .link, .link:link, .link:active, .link:visited {
    text-decoration: none;
    padding: 0px 2px 0px 2px;
    box-shadow: inset 0 -1px 0 -1px #194C8B;
    border-radius: 3px;
    transition: box-shadow .15s ease-in-out;
  }
  [data-bs-theme="light"] .link:hover {
      text-decoration: none;
      color: white;
      box-shadow: inset 0 -40px 0 -1px #2773a5;
  }
  [data-bs-theme="dark"] .link:hover {
      text-decoration: none;
      color: white;
      box-shadow: inset 0 -40px 0 -1px #204267;
  }
  .comment-button, .comment-button:link, .comment-button:active, .comment-button:visited {
      text-decoration: none;
      text-decoration-color: rgba(44, 109, 188, 1.0);
      color: #3F85C2;
      transition: transform .12s ease, opacity .12s ease;
      box-shadow: none;
      /*display: inline-block;comment-button
      position: relative;*/
  }
  .comment-button:hover {
      text-decoration: none;
      color: #4C9FE8;
      box-shadow: none;
      /*transform: scale(1.1);*/
  }
  .inverted-link a, .inverted-link a:link, .inverted-link a:active, .inverted-link a:visited {
      text-decoration: none;
      padding: 1px 2px 1px 2px;
      color: white;
      box-shadow: inset 0 -3px 0 -1px white;
      transition: box-shadow .15s ease-in-out;
  }
  .inverted-link a:hover {
      color: black;
      box-shadow: inset 0 -40px 0 -1px white;
  }

  [data-bs-theme="light"] .moon-svg-icon { display: none;}
  [data-bs-theme="dark"] .sun-svg-icon {display: none}

  [data-bs-theme="light"] .highlight-yellow { border-radius: 3px; background-color: #F4C559;}
  [data-bs-theme="dark"] .highlight-yellow { border-radius: 3px; background-color: #514624;}

  [data-bs-theme="light"] .verse {color: #LightSubtitleColor;}
  [data-bs-theme="dark"] .verse {color: #DarkSubtitleColor;}

  .modal-text {font-family: "EB Garamond", sans-serif; font-size: 13pt;}

  .navbar {
    font-family: "Montserrat", sans-serif;
    font-weight: 300;
    font-style: normal;
  }
  .card-index, .post-title {
    font-family: "Montserrat", sans-serif;
    font-weight: 600;
    font-style: normal;
  }
  .post-title {
    font-family: "Montserrat", sans-serif;
    font-weight: 400;
    font-style: normal;
    font-size: 22pt;
  }
  .content {
    font-family: 'EB Garamond', serif;
    font-optical-sizing: auto;
    font-weight: 400;
    font-style: normal;
  }
  [data-bs-theme="light"] details summary {
    list-style: none; /* remove marcador em alguns navegadores */
    cursor: pointer;
    margin-top: 0px;
    margin-bottom: 5px;
    padding: 0px;
    color: #LightSubtitleColor;
  }
  [data-bs-theme="dark"] details summary {
    list-style: none;
    cursor: pointer;
    margin-top: 0px;
    margin-bottom: 5px;
    padding: 0px;
    color: #DarkSubtitleColor;
  }
  details summary p {
    padding: 0px;
    margin: 0px;
  }
  details summary::-webkit-details-marker {
    display: none; /* remove seta no Chrome/Safari */
  }
  [data-bs-theme="light"] details summary::before {
    content: "⦊";  /* ▶ › ﹥ 〉⦊*/
    display: inline-block;
    margin-right: 8px;
    transition: transform 0.2s;
    color: #LightSubtitleColor;
  }
  [data-bs-theme="dark"] details summary::before {
    content: "⦊";
    display: inline-block;
    margin-right: 8px;
    transition: transform 0.2s;
    color: #DarkSubtitleColor;
  }
  details[open] summary::before {
    transform: rotate(90deg);
  }
  details {
    border-radius: 8px;
    padding: .5rem 1rem;
    padding-bottom: .1rem;
    margin-bottom: .5rem;
  }
  [data-bs-theme="light"] details[open] {
    background: #00000007;
    border: 1px solid #00000010;
  }
  [data-bs-theme="dark"] details[open] {
    background: #FFFFFF07;
    border: 1px solid #FFFFFF10;
  }
 </style>
 <script>
  const savedTheme = localStorage.getItem('page_theme') || 'light';
  document.documentElement.setAttribute('data-bs-theme', savedTheme);
  
  const savedLang = localStorage.getItem('page_lang') || 'en-US';
  document.documentElement.setAttribute('lang', savedLang);
  // REDIRECT
 </script>
</head>
<body>

<!-- Nav top -->
 <div class="navbar navbar-expand-lg bg-body-tertiary m-0 p-0">
  <div class="container-fluid m-0 p-0">
   <a class="navbar-brand ms-2 me-auto" href="#BRAND">
    <img src="#brand"> <!-- PAGE NAME -->
   </a>
   <div class="m-0 p-0 mx-auto">&nbsp;</div>
   <div class="row m-0 p-0">
    <div class="col m-0 p-0">
     <button class="btn border-0 p-2 mx-2" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="sun-svg-icon" viewBox="0 0 16 16">
       <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6m0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/>
      </svg>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="moon-svg-icon" viewBox="0 0 16 16">
        <path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278M4.858 1.311A7.27 7.27 0 0 0 1.025 7.71c0 4.02 3.279 7.276 7.319 7.276a7.32 7.32 0 0 0 5.205-2.162q-.506.063-1.029.063c-4.61 0-8.343-3.714-8.343-8.29 0-1.167.242-2.278.681-3.286"/>
      </svg>
     </button>
    </div>

    <div class="col d-flex m-2 me-4 p-0">
      <a type="button" class="text-nowrap text-decoration-none text-body ms-1" data-bs-toggle="modal" data-bs-target="#modalLang">
       <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="translate-svg-icon" viewBox="0 0 16 16">
        <path d="M4.545 6.714 4.11 8H3l1.862-5h1.284L8 8H6.833l-.435-1.286zm1.634-.736L5.5 3.956h-.049l-.679 2.022z"/>
        <path d="M0 2a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v3h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-3H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zm7.138 9.995q.289.451.63.846c-.748.575-1.673 1.001-2.768 1.292.178.217.451.635.555.867 1.125-.359 2.08-.844 2.886-1.494.777.665 1.739 1.165 2.93 1.472.133-.254.414-.673.629-.89-1.125-.253-2.057-.694-2.82-1.284.681-.747 1.222-1.651 1.621-2.757H14V8h-3v1.047h.765c-.318.844-.74 1.546-1.272 2.13a6 6 0 0 1-.415-.492 2 2 0 0 1-.94.31"/>
       </svg>
      </a>
      <small>
       <a type="button" class="text-nowrap text-decoration-none text-body ms-1" id="currentLang" data-bs-toggle="modal" data-bs-target="#modalLang"> en-US </a>
      </small>
     <div class="modal fade" id="modalLang" tabindex="-1" aria-labelledby="#idLabel" aria-hidden="true" data-bs-theme="read">
      <div class="modal-dialog modal-sm modal-dialog-scrollable">
       <div class="modal-content">
        <div class="modal-body p-0 m-0">

         <div class="px-2 mt-2">
           <!-- LANGS -->
         </div>

         <div class=" p-0 m-1">
          <div class="d-grid gap-2 d-flex justify-content-end">
           <button type="button" class="btn btn-outline-danger btn-sm border border-0" data-bs-dismiss="modal" aria-label="Close">
             <!-- CLOSE ICON -->
           </button>

          </div>
         </div>
        </div>
       </div>
      </div>
     </div>

    </div>

    <div class="col m-0 p-0">
     <button class="navbar-toggler m-0 p-0 ms-0 me-2 mt-1" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
     </button>
    </div>

   </div>
  </div>
 </div>

<!-- Nav items -->
 <div class="navbar navbar-expand-lg bg-body-tertiary text-uppercase m-0 p-0">
  <div class="container-fluid m-0 p-0">
   <div class="collapse navbar-collapse m-0 p-0" id="navbarSupportedContent">
    <ul class="navbar-nav m-0 p-0 mx-auto">
     <!-- NAV ITEM -->
    </ul>
   </div>
  </div>
 </div>
 <!-- / -->
 <!-- PAGINATION -->
 <script>
  function toggleTheme() {
   const html = document.documentElement;
   const currentTheme = html.getAttribute('data-bs-theme');
   const newTheme = currentTheme === 'light' ? 'dark' : 'light';
   html.setAttribute('data-bs-theme', newTheme);
    localStorage.setItem('page_theme', newTheme);
   }

   function changeLang(newLang) {
    const html = document.documentElement;
    html.setAttribute('lang', newLang);
    localStorage.setItem('page_lang', newLang);
    document.getElementById('currentLang').innerText = newLang;
   }

   window.addEventListener('DOMContentLoaded', () => {
    const chosenLang = localStorage.getItem('page_lang') || 'en-US';
    document.getElementById('currentLang').innerText = chosenLang;
   });
 </script>
</body>
</html>
