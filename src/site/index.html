<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
 <meta charset="UTF-8">

 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
 <style>
  [data-bs-theme="light"] .moon-svg-icon { display: none; }
  [data-bs-theme="dark"] .sun-svg-icon { display: none; }
 </style>
 <script>
  const savedTheme = localStorage.getItem('page_theme') || 'light';
  document.documentElement.setAttribute('data-bs-theme', savedTheme);

  const savedLang = localStorage.getItem('page_lang') || 'en-US';
  document.documentElement.setAttribute('lang', savedLang);

  const defaultLang = "pt-BR";
  const targetUrl = `${savedLang}/index.html`;
  fetch(targetUrl, { method: 'HEAD' })
      .then(response => {
          if (response.ok) {
              window.location.replace(targetUrl);
          } else {
              tratarIdiomaInvalido();
          }
      })
      .catch(() => {
          tratarIdiomaInvalido();
      });

  function tratarIdiomaInvalido() {
      localStorage.setItem('page_lang', defaultLang);      document.cookie = `lang=${defaultLang}; path=/; max-age=31536000`;
      window.location.replace(`${defaultLang}/index.html`);
  }
 </script>
</head>

 <script>
  function toggleTheme() {
   const html = document.documentElement;
   const currentTheme = html.getAttribute('data-bs-theme');
   const newTheme = currentTheme === 'light' ? 'dark' : 'light';
   html.setAttribute('data-bs-theme', newTheme);
    localStorage.setItem('page_theme', newTheme);
   }

   function changeLang(newLang) {
    const html = document.documentElement;
    html.setAttribute('lang', newLang);
    localStorage.setItem('page_lang', newLang);
    document.getElementById('currentLang').innerText = newLang;
   }

   window.addEventListener('DOMContentLoaded', () => {
    const chosenLang = localStorage.getItem('page_lang') || 'en-US';
    document.getElementById('currentLang').innerText = chosenLang;
   });
 </script>
